<aside class="tweaks" id="tweaks">
  <h3>Tweaks <button class="close" id="tw-close" aria-label="close">×</button></h3>

  <div class="tweak-row">
    <label>Style</label>
    <div class="seg" data-key="style">
      <button data-v="modern">Modern</button>
      <button data-v="classic">Classic</button>
      <button data-v="editorial">Editorial</button>
    </div>
  </div>

  <div class="tweak-row">
    <label>Accent colour</label>
    <div class="swatches" data-key="accent">
      <button data-v="terracotta" style="background: oklch(0.55 0.10 50)" title="Terracotta"></button>
      <button data-v="olive"      style="background: oklch(0.50 0.08 120)" title="Olive"></button>
      <button data-v="navy"       style="background: oklch(0.40 0.08 250)" title="Navy"></button>
      <button data-v="plum"       style="background: oklch(0.42 0.09 340)" title="Plum"></button>
      <button data-v="ink"        style="background: oklch(0.25 0.01 60)" title="Ink"></button>
    </div>
  </div>

  <div class="tweak-row">
    <label>Sidebar position</label>
    <div class="seg" data-key="sidebar">
      <button data-v="left">Left</button>
      <button data-v="right">Right</button>
    </div>
  </div>

  <div class="tweak-row">
    <label>Photo</label>
    <div class="seg" data-key="photo">
      <button data-v="on">Show</button>
      <button data-v="off">Hide</button>
    </div>
  </div>
</aside>
