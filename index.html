<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CV Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sections/ui/editor.css">
<style>
:root {
  --style: 'modern';
  --sidebar-pos: 'left';

  --accent: oklch(0.55 0.10 50);
  --sidebar-bg: oklch(0.22 0.01 60);
  --sidebar-fg: oklch(0.94 0.008 80);
  --sidebar-mute: oklch(0.72 0.01 60);
  --sidebar-rule: oklch(0.35 0.01 60);

  --paper: oklch(0.985 0.004 80);
  --ink: oklch(0.22 0.01 60);
  --ink-2: oklch(0.35 0.01 60);
  --mute: oklch(0.58 0.008 60);
  --rule: oklch(0.90 0.006 70);

  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  --sidebar-w: 34%;
}

html[data-style="classic"] {
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: Georgia, 'Times New Roman', serif;
}
html[data-style="editorial"] {
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Inter', system-ui, sans-serif;
}
html[data-style="minimal"] {
  --font-display: 'Inter', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
}
html[data-style="minimal"] .num { display: none; }
html[data-style="minimal"] .side-h::before { border-radius: 50%; }
html[data-style="minimal"] .summary .lead::first-letter {
  font-size: inherit; float: none; padding: 0; line-height: inherit;
}
html[data-style="bold"] {
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'Inter', system-ui, sans-serif;
}
html[data-style="bold"] .name { font-weight: 400; letter-spacing: -0.02em; }
html[data-style="bold"] .sec-h { font-weight: 800; letter-spacing: 0.28em; font-size: 11px; }
html[data-style="bold"] .edu-title,
html[data-style="bold"] .job-title,
html[data-style="bold"] .train-title { font-size: 20px; }
html[data-style="bold"] .side-h { letter-spacing: 0.22em; }

/* Font size variants — screen */
html[data-fontsize="small"] .sidebar { font-size: 11px; }
html[data-fontsize="small"] .name { font-size: 50px; }
html[data-fontsize="small"] .summary { font-size: 13px; }
html[data-fontsize="small"] .summary .lead::first-letter { font-size: 33px; }
html[data-fontsize="small"] .edu-title,
html[data-fontsize="small"] .job-title,
html[data-fontsize="small"] .train-title { font-size: 17px; }
html[data-fontsize="small"] .edu-where,
html[data-fontsize="small"] .job-where { font-size: 12px; }
html[data-fontsize="small"] .edu-note,
html[data-fontsize="small"] .job-note { font-size: 12px; }
html[data-fontsize="small"] .soft { font-size: 12px; }

html[data-fontsize="large"] .sidebar { font-size: 14px; }
html[data-fontsize="large"] .name { font-size: 70px; }
html[data-fontsize="large"] .summary { font-size: 16px; }
html[data-fontsize="large"] .summary .lead::first-letter { font-size: 50px; }
html[data-fontsize="large"] .edu-title,
html[data-fontsize="large"] .job-title,
html[data-fontsize="large"] .train-title { font-size: 24px; }
html[data-fontsize="large"] .edu-where,
html[data-fontsize="large"] .job-where { font-size: 14px; }
html[data-fontsize="large"] .edu-note,
html[data-fontsize="large"] .job-note { font-size: 15px; }
html[data-fontsize="large"] .soft { font-size: 15px; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: oklch(0.94 0.005 70);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'ss01','cv11';
  padding: 36px 20px 80px;
  min-height: 100vh;
}

.slot { display: contents; }

.page {
  width: 210mm;
  min-height: 297mm;
  margin: 0 auto;
  background: var(--paper);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 30px 80px -20px rgba(0,0,0,0.18);
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  overflow: hidden;
  position: relative;
}
html[data-sidebar="right"] .page {
  grid-template-columns: 1fr var(--sidebar-w);
}
html[data-sidebar="right"] .sidebar { order: 2; }

.sidebar {
  background: var(--sidebar-bg);
  color: var(--sidebar-fg);
  padding: 34px 28px 40px;
  font-size: 11.5px;
  line-height: 1.55;
}

.photo {
  width: 78%;
  aspect-ratio: 1 / 1;
  margin-left: auto;
  margin-right: auto;
  background:
    repeating-linear-gradient(135deg,
      oklch(0.32 0.01 60) 0 10px,
      oklch(0.28 0.01 60) 10px 20px);
  display: grid;
  place-items: center;
  color: var(--sidebar-mute);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 22px;
  border: 1px solid oklch(0.3 0.01 60);
}
html[data-photo="off"] .photo { display: none; }

.side-section { margin-top: 22px; }
.side-section:first-of-type { margin-top: 0; }

.side-h {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--sidebar-fg);
  margin: 0 0 10px;
  padding-bottom: 7px;
  border-bottom: 1px solid var(--sidebar-rule);
  display: flex;
  align-items: center;
  gap: 8px;
}
.side-h::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 1px;
  display: inline-block;
}

.contact-row {
  display: grid;
  grid-template-columns: 70px 1fr;
  gap: 4px 10px;
  padding: 6px 0;
  font-size: 11px;
  border-bottom: 1px dotted oklch(0.35 0.01 60);
}
.contact-row:last-child { border-bottom: 0; }
.contact-row .k {
  color: var(--sidebar-mute);
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding-top: 2px;
}
.contact-row .v { color: var(--sidebar-fg); word-break: break-word; }
.contact-row.cv-empty { display: none; }

.skill-list { list-style: none; padding: 0; margin: 0; }
.skill-list li {
  padding: 5px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  border-bottom: 1px dotted oklch(0.32 0.01 60);
  font-size: 11.5px;
}
.skill-list li:last-child { border-bottom: 0; }
.skill-list .bar {
  flex: 1;
  height: 3px;
  background: oklch(0.32 0.01 60);
  position: relative;
  border-radius: 1px;
  max-width: 80px;
}
.skill-list .bar::after {
  content: '';
  position: absolute;
  inset: 0 auto 0 0;
  width: var(--lv, 70%);
  background: var(--accent);
  border-radius: 1px;
}

.lang-list { list-style: none; padding: 0; margin: 0; }
.lang-list li {
  padding: 6px 0;
  border-bottom: 1px dotted oklch(0.32 0.01 60);
  display: flex;
  justify-content: space-between;
  font-size: 11.5px;
}
.lang-list li:last-child { border-bottom: 0; }
.lang-list .lvl {
  color: var(--sidebar-mute);
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.hobby-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 2px;
}
.hobby-chips span {
  font-size: 10.5px;
  padding: 4px 9px;
  border: 1px solid oklch(0.4 0.01 60);
  border-radius: 100px;
  color: var(--sidebar-fg);
}

.ref-card {
  padding: 8px 0;
  border-bottom: 1px dotted var(--sidebar-rule);
  line-height: 1.5;
}
.ref-card:last-child { border-bottom: 0; }
.ref-name {
  font-size: 11.5px;
  font-weight: 600;
  color: var(--sidebar-fg);
}
.ref-role {
  font-size: 10.5px;
  color: var(--sidebar-mute);
}
.ref-phone {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--sidebar-fg);
  margin-top: 3px;
  letter-spacing: 0.03em;
}

.main {
  padding: 40px 44px 44px;
  color: var(--ink);
}

.header {
  padding-bottom: 22px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 26px;
}
.name {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 56px;
  line-height: 0.95;
  letter-spacing: -0.01em;
  margin: 0 0 6px;
  color: var(--ink);
}
.role {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-2);
  margin: 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
.role::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule);
}

.section { margin-bottom: 22px; }
.section:last-child { margin-bottom: 0; }

.sec-h {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-2);
  margin: 0 0 12px;
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.sec-h .num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0;
}
.sec-h::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule);
}

.summary {
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--ink-2);
  text-wrap: pretty;
  max-width: 64ch;
}
.summary .lead::first-letter {
  font-family: var(--font-display);
  font-size: 38px;
  float: left;
  line-height: 0.9;
  padding: 4px 8px 0 0;
  color: var(--ink);
}

.edu-item, .job-item {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 18px;
  padding: 10px 0;
  border-bottom: 1px solid var(--rule);
}
.edu-item:last-child, .job-item:last-child { border-bottom: 0; }

.meta-date {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  color: var(--mute);
  padding-top: 3px;
}
.edu-title, .job-title {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 400;
  margin: 0 0 2px;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.edu-where, .job-where {
  font-size: 12px;
  color: var(--ink-2);
  margin: 0 0 6px;
  display: flex;
  gap: 10px;
  align-items: center;
}
.edu-where .sep, .job-where .sep { color: var(--accent); }

.edu-note, .job-note {
  font-size: 12.5px;
  color: var(--ink-2);
  line-height: 1.55;
  margin: 0;
}
.edu-note ul, .job-note ul {
  margin: 4px 0 0;
  padding: 0;
  list-style: none;
}
.edu-note li, .job-note li {
  padding: 2px 0 2px 16px;
  position: relative;
}
.edu-note li::before, .job-note li::before {
  content: '';
  position: absolute;
  left: 0; top: 10px;
  width: 6px; height: 1px;
  background: var(--accent);
}

.train-item {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 18px;
  padding: 10px 0;
  border-bottom: 1px solid var(--rule);
}
.train-item:last-child { border-bottom: 0; }
.train-title {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 400;
  margin: 0 0 2px;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.train-where {
  font-size: 12px;
  color: var(--ink-2);
  margin: 0;
}
.train-dur {
  color: var(--mute);
  font-size: 11px;
}

.soft-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px 20px;
}
.soft {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 4px 0;
  font-size: 12.5px;
  color: var(--ink-2);
  border-bottom: 1px dotted var(--rule);
}
.soft .dot {
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  flex: 0 0 auto;
}
.soft b { font-weight: 600; color: var(--ink); }

.page-foot {
  margin-top: 24px;
  padding-top: 14px;
  border-top: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mute);
}

.tweaks {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 280px;
  background: oklch(0.99 0.004 80);
  border: 1px solid oklch(0.85 0.006 70);
  border-radius: 12px;
  padding: 14px;
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--ink);
  box-shadow: 0 20px 40px -20px rgba(0,0,0,0.2);
  z-index: 50;
  display: none;
}
.tweaks.on { display: block; }
.tweaks h3 {
  margin: 0 0 12px;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  display: flex; justify-content: space-between; align-items: center;
}
.tweaks .close {
  border: 0; background: transparent; cursor: pointer;
  font-size: 14px; color: var(--mute);
}
.tweak-row {
  margin-bottom: 12px;
}
.tweak-row label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mute);
  margin-bottom: 6px;
}
.seg {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 1fr;
  border: 1px solid oklch(0.85 0.006 70);
  border-radius: 8px;
  overflow: hidden;
}
.seg button {
  background: transparent;
  border: 0;
  padding: 7px 4px;
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  color: var(--ink-2);
}
.seg button + button { border-left: 1px solid oklch(0.9 0.005 70); }
.seg button.active {
  background: var(--ink);
  color: var(--paper);
}
.swatches { display: flex; gap: 8px; }
.swatches button {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid oklch(0.9 0.005 70);
  cursor: pointer;
  padding: 0;
}
.swatches button.active {
  border-color: var(--ink);
  transform: scale(1.1);
}

@media print {
  @page { margin: 0; size: A4 portrait; }
  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  body {
    padding: 0 !important;
    margin: 0 !important;
    background: white !important;
    width: 210mm !important;
  }
  .page {
    box-shadow: none !important;
    width: 210mm !important;
    min-height: 297mm !important;
    margin: 0 !important;
    display: grid !important;
    grid-template-columns: var(--sidebar-w) 1fr !important;
    align-items: start !important;
    overflow: visible !important;
    position: static !important;
  }
  .sidebar {
    min-height: 297mm !important;
    break-inside: avoid;
    page-break-inside: avoid;
  }
  .tweaks, #style-fab,
  #edit-fab, #ed-pdf, #github-fab, .ed-panel, .ed-overlay { display: none !important; }
  html[data-sidebar="right"] .page { grid-template-columns: 1fr var(--sidebar-w) !important; }
  html[data-sidebar="right"] .sidebar { order: 2; }
  .section { break-inside: avoid; page-break-inside: avoid; }
  .edu-item, .job-item, .train-item { break-inside: avoid; page-break-inside: avoid; }
  .main    { padding: 18px 28px 10px !important; }
  .sidebar { padding: 16px 18px 10px !important; }
  .header  { padding-bottom: 8px !important; margin-bottom: 10px !important; }
  .name    { font-size: 40px !important; line-height: 1.1 !important; }
  .role    { font-size: 13px !important; margin-top: 4px !important; }
  .section { margin-bottom: 9px !important; }
  .sec-h   { margin-bottom: 7px !important; font-size: 11px !important; }
  .summary          { font-size: 12.5px !important; line-height: 1.4 !important; }
  .summary .lead::first-letter { font-size: 24px !important; }
  .summary p, .summary .lead { margin: 0 !important; }
  .edu-item, .job-item, .train-item { padding: 3px 0 !important; }
  .edu-title, .job-title, .train-title { font-size: 13.5px !important; margin: 0 !important; }
  .edu-where, .job-where, .train-where { font-size: 12px !important; margin: 1px 0 2px !important; }
  .edu-note, .job-note { font-size: 12px !important; margin-top: 2px !important; line-height: 1.4 !important; }
  .edu-note ul, .job-note ul { margin: 0 !important; padding: 0 !important; list-style: none !important; }
  .edu-note li, .job-note li {
    padding: 0 0 0 16px !important;
    margin: 0 !important;
    position: relative !important;
  }
  .edu-note li::before, .job-note li::before {
    left: 0 !important;
    top: 0.72em !important;
    transform: translateY(-50%);
  }
  .ref-card { padding: 4px 0 !important; }
  .soft       { padding: 1px 0 !important; font-size: 12.5px !important; }
  .soft-grid  { gap: 4px 14px !important; }
  .photo       { margin-bottom: 10px !important; }
  .side-section { margin-top: 10px !important; }
  .contact-row  { padding: 2px 0 !important; font-size: 12px !important; }
  .contact-row .k { font-size: 11px !important; }
  .skill-list li { padding: 2px 0 !important; font-size: 12px !important; }
  .lang-list li  { padding: 2px 0 !important; font-size: 12px !important; }
  .side-h       { margin-bottom: 5px !important; padding-bottom: 4px !important; font-size: 10.5px !important; }
  .meta-date    { font-size: 12px !important; }

  /* Font size variants — print */
  html[data-fontsize="small"] .name    { font-size: 26px !important; }
  html[data-fontsize="small"] .summary { font-size: 10px !important; }
  html[data-fontsize="small"] .summary .lead::first-letter { font-size: 16px !important; }
  html[data-fontsize="small"] .edu-title,
  html[data-fontsize="small"] .job-title,
  html[data-fontsize="small"] .train-title { font-size: 10px !important; }
  html[data-fontsize="small"] .edu-where,
  html[data-fontsize="small"] .job-where,
  html[data-fontsize="small"] .train-where { font-size: 9px !important; }
  html[data-fontsize="small"] .edu-note,
  html[data-fontsize="small"] .job-note    { font-size: 9px !important; }
  html[data-fontsize="small"] .soft        { font-size: 9.5px !important; }
  html[data-fontsize="small"] .sidebar     { font-size: 10.5px !important; }

  html[data-fontsize="large"] .name    { font-size: 56px !important; }
  html[data-fontsize="large"] .summary { font-size: 14px !important; }
  html[data-fontsize="large"] .summary .lead::first-letter { font-size: 32px !important; }
  html[data-fontsize="large"] .edu-title,
  html[data-fontsize="large"] .job-title,
  html[data-fontsize="large"] .train-title { font-size: 16px !important; }
  html[data-fontsize="large"] .edu-where,
  html[data-fontsize="large"] .job-where,
  html[data-fontsize="large"] .train-where { font-size: 13px !important; }
  html[data-fontsize="large"] .edu-note,
  html[data-fontsize="large"] .job-note    { font-size: 13px !important; }
  html[data-fontsize="large"] .soft        { font-size: 14px !important; }
  html[data-fontsize="large"] .sidebar     { font-size: 15px !important; }
}

@media only screen and (max-width: 820px) {
  .page { width: 100%; grid-template-columns: 1fr; min-height: 0; }
  html[data-sidebar="right"] .page { grid-template-columns: 1fr; }
  .main { padding: 28px; }
  .name { font-size: 42px; }
}
</style>
</head>
<body>

<script>
  const TWEAK_DEFAULTS = {
    style: 'modern',
    accent: 'terracotta',
    sidebar: 'left',
    photo: 'on',
    fontsize: 'medium',
    sidebarcolor: 'charcoal'
  };
</script>

<main class="page" data-screen-label="01 CV">
  <div class="slot" data-slot="sidebar"></div>

  <section class="main">
    <div class="slot" data-slot="header"></div>
    <div class="slot" data-slot="objective"></div>
    <div class="slot" data-slot="work-experience"></div>
    <div class="slot" data-slot="education"></div>
    <div class="slot" data-slot="training"></div>
    <div class="slot" data-slot="strengths"></div>
    <div class="slot" data-slot="footer"></div>
  </section>
</main>

<div class="slot" data-slot="tweaks"></div>
<div class="slot" data-slot="editor"></div>

<script>
(function loadSections() {
  const mounts = Array.from(document.querySelectorAll('[data-slot]'));
  if (mounts.length && mounts.every(mount => mount.children.length)) {
    return;
  }

  function requestText(url) {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, false);
    xhr.send(null);
    if ((xhr.status >= 200 && xhr.status < 300) || xhr.status === 0) {
      return xhr.responseText;
    }
    throw new Error('Failed to load ' + url + ' (' + xhr.status + ')');
  }

  let manifest = { sections: [] };
  try {
    manifest = JSON.parse(requestText('sections/manifest.json'));
  } catch (error) {
    console.warn('Section manifest not loaded yet.', error);
    return;
  }

  manifest.sections.forEach(({ slot, file }) => {
    const mount = document.querySelector('[data-slot="' + slot + '"]');
    if (!mount || mount.children.length) return;
    mount.innerHTML = requestText(file);
  });
})();
</script>

<script>
(function(){
  const ACCENTS = {
    terracotta: 'oklch(0.55 0.10 50)',
    olive:      'oklch(0.50 0.08 120)',
    navy:       'oklch(0.40 0.08 250)',
    plum:       'oklch(0.42 0.09 340)',
    ink:        'oklch(0.25 0.01 60)',
  };

  const SIDEBAR_COLORS = {
    charcoal: { bg: 'oklch(0.22 0.01 60)',  fg: 'oklch(0.94 0.008 80)',  mute: 'oklch(0.72 0.01 60)',  rule: 'oklch(0.35 0.01 60)'  },
    slate:    { bg: 'oklch(0.28 0.06 240)', fg: 'oklch(0.94 0.008 210)', mute: 'oklch(0.70 0.04 220)', rule: 'oklch(0.40 0.05 240)' },
    forest:   { bg: 'oklch(0.25 0.07 160)', fg: 'oklch(0.94 0.008 140)', mute: 'oklch(0.68 0.05 150)', rule: 'oklch(0.38 0.06 160)' },
    wine:     { bg: 'oklch(0.28 0.08 10)',  fg: 'oklch(0.94 0.008 30)',  mute: 'oklch(0.68 0.06 15)',  rule: 'oklch(0.40 0.07 10)'  },
    sand:     { bg: 'oklch(0.92 0.015 80)', fg: 'oklch(0.25 0.01 60)',   mute: 'oklch(0.50 0.01 60)',  rule: 'oklch(0.78 0.01 80)'  },
  };

  const state = Object.assign({}, TWEAK_DEFAULTS);

  function apply() {
    const html = document.documentElement;
    html.setAttribute('data-style', state.style);
    html.setAttribute('data-sidebar', state.sidebar);
    html.setAttribute('data-photo', state.photo);
    html.setAttribute('data-fontsize', state.fontsize);
    html.style.setProperty('--accent', ACCENTS[state.accent] || ACCENTS.terracotta);

    const sc = SIDEBAR_COLORS[state.sidebarcolor] || SIDEBAR_COLORS.charcoal;
    html.style.setProperty('--sidebar-bg',   sc.bg);
    html.style.setProperty('--sidebar-fg',   sc.fg);
    html.style.setProperty('--sidebar-mute', sc.mute);
    html.style.setProperty('--sidebar-rule', sc.rule);

    document.querySelectorAll('.seg').forEach(seg => {
      const key = seg.dataset.key;
      seg.querySelectorAll('button').forEach(b =>
        b.classList.toggle('active', b.dataset.v === state[key]));
    });
    document.querySelectorAll('.swatches').forEach(sw => {
      const key = sw.dataset.key;
      sw.querySelectorAll('button').forEach(b =>
        b.classList.toggle('active', b.dataset.v === state[key]));
    });
  }
  apply();

  document.querySelectorAll('.seg, .swatches').forEach(group => {
    group.addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn || !btn.dataset.v) return;
      const key = group.dataset.key;
      state[key] = btn.dataset.v;
      apply();
      try {
        window.parent.postMessage({type:'__edit_mode_set_keys', edits:{ [key]: state[key] }}, '*');
      } catch(_) {}
    });
  });

  window.__cvApplyTheme = function(themeData) {
    Object.assign(state, themeData);
    apply();
  };

  const panel = document.getElementById('tweaks');
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode') panel.classList.add('on');
    if (d.type === '__deactivate_edit_mode') panel.classList.remove('on');
  });
  document.getElementById('tw-close').addEventListener('click', () => {
    panel.classList.remove('on');
  });
  try {
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
  } catch(_) {}
})();
</script>

<script src="sections/ui/editor.js"></script>

</body>
</html>
