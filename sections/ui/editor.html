<button id="edit-fab" type="button">✏ Edit CV</button>
<button id="upload-fab" type="button">⬆ Upload CV (JSON)</button>
<input type="file" id="cv-upload-input" accept=".json" aria-label="Upload saved CV data file">
<!-- <button id="pdf-import-fab" type="button">📄 Load from PDF</button>
<span id="pdf-hint" class="pdf-hint-icon" role="note">ℹ<span class="pdf-hint-tip">Only PDFs exported by this CV Builder are supported. Photo and skill levels (%) cannot be recovered from PDF.</span></span> -->
<input type="file" id="cv-pdf-input" accept=".pdf" aria-label="Upload PDF generated by this CV Builder">
<button id="style-fab" type="button">🎨 Style</button>
<div class="ed-overlay" id="ed-overlay"></div>
<div class="ed-panel" id="ed-panel">
  <div class="ed-head">
    <span class="ed-head-title">Edit CV</span>
    <div class="ed-head-right">
      <button class="eb eb-save" id="ed-save" type="button">Save Changes</button>
      <button class="eb eb-close" id="ed-close" type="button" aria-label="Close">×</button>
    </div>
  </div>
  <div class="ed-body" id="ed-body"></div>
  <div class="ed-footer">
    <button class="eb eb-save-json" id="ed-save-json" type="button">⬇ Save CV Data</button>
    <button class="eb eb-pdf" id="ed-pdf" type="button">⬇ Download PDF</button>
  </div>
</div>
